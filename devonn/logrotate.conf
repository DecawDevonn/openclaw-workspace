/home/ubuntu/.openclaw/workspace/devonn/logs/*.log {
    daily
    rotate 14
    compress
    delaycompress
    missingok
    notifempty
    create 0644 ubuntu ubuntu
    sharedscripts
    postrotate
        # Restart scheduler to release file handles
        /bin/systemctl reload devonn-scheduler 2>/dev/null || true
    endscript
}
