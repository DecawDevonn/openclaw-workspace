apiVersion: apps/v1
kind: Deployment
metadata:
  name: devonn-api
  namespace: default
  labels:
    app: devonn-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: devonn-api
  template:
    metadata:
      labels:
        app: devonn-api
    spec:
      containers:
        - name: api
          image: devonn/devonn-api:latest
          ports:
            - containerPort: 8000
          env:
            - name: PORT
              value: "8000"
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: devonn-api-service
  namespace: default
spec:
  type: NodePort
  selector:
    app: devonn-api
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
